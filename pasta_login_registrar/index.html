<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registro - Atlas</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
  <div class="container">

    <!-- FORMULÁRIO DE LOGIN -->
    <div class="form-box login">
      <div class="form-inner">
        <h1>Login</h1>

        <div class="input-box">
          <input type="text" id="login-user" placeholder="E-mail ou usuário" required>
          <i class='bx bx-user'></i>
        </div>

        <div class="input-box">
          <input type="password" id="login-pass" placeholder="Senha" required>
          <i class='bx bx-lock'></i>
        </div>

        <div class="forgot-link">
          <a href="../esqueci_senha/esq_senha.html">Esqueci minha senha</a>
        </div>

        <!--
          IMPORTANTE: type="button" evita que o <form> recarregue a página.
          onclick="handleLogin()" chama a função do script.js.
        -->
        <button type="button" class="btn" onclick="handleLogin()">Entrar</button>

        <p>ou logar com outras plataformas</p>
        <div class="social-icons">
          <a href="#"><i class='bx bxl-google'></i></a>
          <a href="#"><i class='bx bxl-facebook'></i></a>
          <a href="#"><i class='bx bxl-twitter'></i></a>
        </div>
      </div>
    </div>

    <!-- FORMULÁRIO DE REGISTRO -->
    <div class="form-box register">
      <div class="form-inner">
        <h1>Registrar</h1>

        <div class="input-box">
          <input type="text" id="reg-nome" placeholder="Seu nome" required>
          <i class='bx bx-user'></i>
        </div>
        <div class="input-box">
          <input type="email" id="reg-email" placeholder="E-mail" required>
          <i class='bx bx-envelope'></i>
        </div>
        <div class="input-box">
          <input type="password" id="reg-pass" placeholder="Senha (mín. 6 caracteres)" required>
          <i class='bx bx-lock'></i>
        </div>

        <!-- type="button" + onclick — mesma razão do login acima -->
        <button type="button" class="btn" onclick="handleRegister()">Criar conta</button>

        <p>ou registrar com outras plataformas</p>
        <div class="social-icons">
          <a href="#"><i class='bx bxl-google'></i></a>
          <a href="#"><i class='bx bxl-facebook'></i></a>
          <a href="#"><i class='bx bxl-twitter'></i></a>
        </div>
      </div>
    </div>

    <!-- PAINEL DE TOGGLE (fundo azul deslizante) -->
    <div class="toggle-box">
      <div class="toggle-panel toggle-left">
        <h1>Bem-Vindo ao Atlas!</h1>
        <p>Já tem conta?</p>
        <button class="btn register-btn">Login</button>
      </div>
      <div class="toggle-panel toggle-right">
        <h1>Bem-vindo de volta!</h1>
        <p>Não tem conta?</p>
        <button class="btn login-btn">Registrar</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
