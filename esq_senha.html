<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Esqueci minha senha - Atlas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">

    <div class="logo-circle">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>

    <h1>Esqueci minha senha</h1>

    <!-- ETAPA 1: E-MAIL -->
    <div id="step1">
      <p class="subtitle">Informe seu e-mail e enviaremos um código de verificação.</p>

      <div class="field">
        <input type="email" id="emailInput" placeholder="seu@email.com" />
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
      </div>

      <button class="btn-primary" onclick="sendCode()">Enviar código</button>

      <a class="back-link" href="index.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
        Voltar para o login
      </a>
    </div>

    <!-- ETAPA 2: CÓDIGO -->
    <div id="step2">
      <span class="email-tag" id="emailTag"></span>
      <p class="subtitle">Digite o código de 6 dígitos enviado para o seu e-mail.</p>

      <span class="code-label">Código de verificação</span>
      <div class="code-inputs">
        <input type="text" maxlength="1" class="code-digit" />
        <input type="text" maxlength="1" class="code-digit" />
        <input type="text" maxlength="1" class="code-digit" />
        <input type="text" maxlength="1" class="code-digit" />
        <input type="text" maxlength="1" class="code-digit" />
        <input type="text" maxlength="1" class="code-digit" />
      </div>

      <button class="btn-primary" id="verifyBtn" onclick="verifyCode()">Verificar código</button>

      <p class="resend">Não recebeu o código? <a onclick="resendCode()">Reenviar</a></p>

      <a class="back-link" onclick="goBack()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
        Alterar e-mail
      </a>
    </div>

  </div>

  <!-- JavaScript agora em arquivo separado -->
  <script src="esq_senha.js"></script>

</body>
</html>
